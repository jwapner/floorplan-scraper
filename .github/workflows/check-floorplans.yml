name: Check Gunther Floorplans

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          RUN_MODE: check
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          ALERT_APP_PASSWORD: ${{ secrets.ALERT_APP_PASSWORD }}
        run: python scrape.py

      - name: Commit updated state file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "Update floorplan state"
          git push

  daily-no-changes-email:
    if: github.event.schedule == '0 1 * * *'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run daily summary logic
        env:
          RUN_MODE: daily_summary
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          ALERT_APP_PASSWORD: ${{ secrets.ALERT_APP_PASSWORD }}
        run: python scrape.py

      - name: Commit updated state file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "Reset daily change flag"
          git push
